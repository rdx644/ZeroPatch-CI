services:
  - type: web
    name: zeropatch-ci-rdx644
    runtime: python
    plan: free
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /health/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zeropatch-ci-db
          property: connectionString
      - key: ZEROPATCH_ALLOWED_HOSTS
        value: zeropatch-ci-rdx644.onrender.com
      - key: ZEROPATCH_ALLOW_AGENT
        value: "0"
      - key: ZEROPATCH_ENV
        value: production
      - key: ZEROPATCH_AUTH_REQUIRED
        value: "1"
      - key: ZEROPATCH_AUDIT_REQUIRED
        value: "1"
      - key: GITHUB_REDIRECT_URI
        value: https://zeropatch-ci-rdx644.onrender.com/auth/github/callback
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: ZEROPATCH_SESSION_SECRET
        sync: false
      - key: ZEROPATCH_ADMIN_LOGINS
        sync: false
databases:
  - name: zeropatch-ci-db
    databaseName: zeropatch_ci
    plan: free