name: ZeroPatch CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./
        with:
          workflow-path: .github/workflows
          fail-on: critical
